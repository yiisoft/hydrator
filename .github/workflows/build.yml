on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.gitignore'
      - '.gitattributes'
      - 'infection.json.dist'
      - 'psalm.xml'

  push:
    branches: ['master']
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'CHANGELOG.md'
      - '.gitignore'
      - '.gitattributes'
      - 'infection.json.dist'
      - 'psalm.xml'

name: build

permissions:
  contents: read
jobs:
  phpunit:
    uses: yiisoft/actions/.github/workflows/phpunit.yml@master
    secrets:
      codecovToken: ${{ secrets.CODECOV_TOKEN }}
    with:
      ini-values: pcov.directory=/home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}, pcov.exclude=#^(?!(/home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}/config/|/home/runner/work/${{ github.event.repository.name }}/${{ github.event.repository.name }}/src/)).*#
      extensions: intl
      os: >-
        ['ubuntu-latest', 'windows-latest']
      php: >-
        ['8.1', '8.2', '8.3', '8.4', '8.5']
